name: Build README PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/readme-pdf.config.cjs
      - .github/workflows/readme-pdf.yml

jobs:
  build-readme-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install markdown to PDF converter
        run: npm install --no-save md-to-pdf

      - name: Render README as a single-page A4 PDF
        run: |
          mkdir -p build
          npx md-to-pdf README.md --config-file .github/readme-pdf.config.cjs

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-pdf
          path: build/README.pdf
